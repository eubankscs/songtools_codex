name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install SQLite CLI
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build --if-present

      - name: Run schema smoke test
        run: ./test/schema-smoke.sh

      - name: Run Phase 2 smoke test
        run: ./test/phase2-smoke.sh

      - name: Run Phase 3a smoke test
        run: ./test/phase3a-smoke.sh

      - name: Run Phase 3b smoke test
        run: ./test/phase3b-smoke.sh

      - name: Run Phase 4 smoke test
        run: ./test/phase4-smoke.sh

      - name: Run Phase 5 smoke test
        run: ./test/phase5-smoke.sh
